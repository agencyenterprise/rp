name: E2E tests

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Configure SSH for pod access
        env:
          CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "${CI_SSH_PRIVATE_KEY:-}" ]; then
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            printf '%s\n' "$CI_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            echo "RP_E2E_SSH_AVAILABLE=1" >> "$GITHUB_ENV"
            echo "SSH key installed from CI_SSH_PRIVATE_KEY."
          else
            echo "CI_SSH_PRIVATE_KEY not set — tests requiring SSH to pods will be skipped."
          fi

      - name: Run E2E tests
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: uv run pytest tests/e2e/ -v

      - name: Sweep leaked test pods
        if: always()
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: uv run python scripts/sweep_test_pods.py

      - name: Record successful run
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git checkout --orphan e2e-last-pass
          git rm -rf . >/dev/null 2>&1 || true
          printf '%s\n' "$TS" > TIMESTAMP
          git add TIMESTAMP
          git commit -m "E2E pass $TS"
          git push --force origin e2e-last-pass
